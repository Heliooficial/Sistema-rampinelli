<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Rampinelli - Impressões</title> 
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    
    <!-- Ícone da aba do navegador usando a logo original -->
    <link rel="icon" type="image/png" href="img/logo-rampinelli.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <link rel='stylesheet' type='text/css' href='impressoes.css'>
</head>

<body>

    <header class="header">
        <a href="index.html" class="logo">
            <!-- Logo do site restaurada para a original conforme solicitado -->
            <img src="img/logo-rampinelli.png" alt="Logo Rampinelli">
        </a>

        <div id="menu-btn" class="fas fa-bars"></div>

        <nav class="navbar">
            <a href="index.html"><i class="fas fa-chart-pie"></i> Painel Inicial</a>
            <a href="impressoes.html" class="active"><i class="fas fa-print"></i> Impressões</a>
            <a href="index.html#analise"><i class="fas fa-chart-bar"></i> Analisar Planilhas</a>
            <a href="index.html#comparador"><i class="fas fa-balance-scale"></i> Comparar Dados</a>
            <a href="login.html" class="btn-logout">Sair <i class="fas fa-sign-out-alt"></i></a>
        </nav>
    </header>

    <div class="impressoes-container">
        
        <aside class="sidebar-menu">
            <a href="#" class="active" data-modulo="pallet"><i class="fas fa-pallet"></i> Termo de Pallet</a>
            <a href="#" class="brevemente" data-modulo="dedetizacao"><i class="fas fa-bug"></i> Dedetização</a>
            <a href="#" class="brevemente" data-modulo="chapa"><i class="fas fa-layer-group"></i> Recibo de Chapa</a>
            <a href="#" class="brevemente" data-modulo="entrega"><i class="fas fa-list"></i> Relação de entrega</a>
        </aside>

        <main class="form-content">
            <div class="form-box">
                <h2>Gerar Termo de Pallet e Chapas</h2>
                <form id="palletForm">
                    <div class="grid-inputs">
                        
                        <!-- NÚMERO DO TERMO -->
                        <div class="input-block">
                            <label>Número do Termo:</label>
                            <input type="text" id="num_termo" required placeholder="Carregando...">
                        </div>

                        <!-- NÚMERO DO LOTE -->
                        <div class="input-block">
                            <label>Número do Lote:</label>
                            <input type="text" id="lote" required placeholder="Ex: L-102">
                        </div>

                        <!-- SELEÇÃO DE TRANSPORTADORA -->
                        <div class="input-block">
                            <label>Transportadora:</label>
                            <select id="transportadora" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; background: #fff; height: 40px;">
                                <option value="">Selecione...</option>
                                <option value="RAMPINELLI">RAMPINELLI</option>
                                <option value="DB MOTA">DB MOTA</option>
                                <option value="MOLEQUINHO">MOLEQUINHO</option>
                                <option value="OUTRA">OUTRA</option>
                            </select>
                        </div>

                        <!-- CNPJ / CPF DO CLIENTE -->
                        <div class="input-block">
                            <label>CNPJ / CPF do Cliente:</label>
                            <input type="text" id="cliente_cnpj" placeholder="Digite e clique fora" onblur="buscarCliente()">
                        </div>

                        <!-- NOME DO CLIENTE (EDITÁVEL) -->
                        <div class="input-block">
                            <label>Cliente Atendido (Editável):</label>
                            <input type="text" id="cliente" required placeholder="Razão Social ou Nome">
                        </div>

                        <!-- CIDADE DE ENTREGA (EDITÁVEL) -->
                        <div class="input-block">
                            <label>Cidade de Entrega (Editável):</label>
                            <input type="text" id="cidade" required placeholder="Cidade - UF">
                        </div>

                        <!-- QUANTIDADE DE PALLETS -->
                        <div class="input-block">
                            <label>Quantidade de Pallets:</label>
                            <input type="number" id="qtd_pallets" required placeholder="0">
                        </div>

                        <!-- QUANTIDADE DE CHAPAS -->
                        <div class="input-block">
                            <label>Quantidade de Chapas:</label>
                            <input type="number" id="qtd_chapas" required placeholder="0">
                        </div>

                        <!-- CPF DO MOTORISTA -->
                        <div class="input-block">
                            <label>CPF do Motorista:</label>
                            <input type="text" id="cpf" required placeholder="000.000.000-00" onblur="buscarMotorista()">
                        </div>

                        <!-- NOME DO MOTORISTA (EDITÁVEL) -->
                        <div class="input-block" style="grid-column: span 2;">
                            <label>Nome do Motorista (Editável):</label>
                            <input type="text" id="motorista" required placeholder="Nome Completo">
                        </div>

                    </div>
                    <button type="button" class="btn-print" id="btnPrint">Gerar e Imprimir <i class="fas fa-print"></i></button>
                </form>
            </div>
        </main>
    </div>

    <div id="print-area"></div>

    <script src="impressoes.js"></script>
</body>
</html>
