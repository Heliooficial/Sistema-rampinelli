<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Rampinelli - Impressões</title> 
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    
    <link rel="icon" type="image/png" href="img/logo-rampinelli.png">
    
    <!-- CSS Geral e Ícones -->
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <!-- O NOVO ARQUIVO CSS EXCLUSIVO -->
    <link rel='stylesheet' type='text/css' href='impressoes.css'>
</head>

<body>
    <!-- Cabeçalho original -->
    <header class="header">
        <a href="index.html" class="logo">
            <img src="img/logo-rampinelli.png" alt="Logo Rampinelli" style="max-height: 40px; width: auto; vertical-align: middle;">
        </a>
        <div id="menu-btn" class="fas fa-bars"></div>
        <nav class="navbar">
            <a href="index.html">Início</a>
            <a href="#about">Ajuda</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <!-- Estrutura do Sistema de Impressões -->
    <div class="impressoes-container">
        
        <!-- Menu Lateral para trocar de Termo -->
        <div class="sidebar-menu">
            <a href="#" class="active"><i class="fas fa-pallet"></i> Termo de Pallet</a>
            <a href="#" onclick="alert('Espaço reservado para Termo de Dedetização')"><i class="fas fa-bug"></i> Dedetização</a>
            <a href="#" onclick="alert('Espaço reservado para Recibo de Chapa')"><i class="fas fa-layer-group"></i> Recibo de Chapa</a>
            <a href="#" onclick="alert('Espaço reservado para Relação de Impressões')"><i class="fas fa-list"></i> Relação de entrega</a>
        </div>

        <!-- Área do Formulário Ativo -->
        <div class="form-content">
            <div class="form-box">
                <h2>Gerar Termo de Pallet e Chapas</h2>
                <form id="palletForm">
                    <div class="grid-inputs">
                        
                        <!-- 1. NÚMERO DO TERMO (Vem automático da planilha e aceita edição) -->
                        <div class="input-block">
    <label>Número do Termo:</label>
    <input type="text" id="num_termo" required placeholder="Carregando...">
</div>

                        <!-- 2. NÚMERO DA ORDEM -->
                        <div class="input-block">
                            <label>Número da Ordem:</label>
                            <input type="text" id="ordem" required placeholder="Ex: 4512">
                        </div>

                        <!-- 3. CAMPO DE BUSCA DO CLIENTE -->
                        <div class="input-block">
                            <label>CNPJ / CPF do Cliente (Digite para buscar):</label>
                            <input type="text" id="cliente_cnpj" placeholder="Digite e clique fora" onblur="buscarCliente()">
                        </div>

                        <!-- 4. NOME DO CLIENTE -->
                        <div class="input-block">
                            <label>Cliente Atendido:</label>
                            <input type="text" id="cliente" required placeholder="Razão Social ou Nome">
                        </div>

                        <!-- 5. CIDADE DE ENTREGA -->
                        <div class="input-block">
                            <label>Cidade de Entrega:</label>
                            <input type="text" id="cidade" required placeholder="Cidade - UF">
                        </div>

                        <!-- 6. QUANTIDADE DE PALLETS -->
                        <div class="input-block">
                            <label>Quantidade de Pallets:</label>
                            <input type="number" id="qtd_pallets" required placeholder="0">
                        </div>

                        <!-- 7. QUANTIDADE DE CHAPAS -->
                        <div class="input-block">
                            <label>Quantidade de Chapas:</label>
                            <input type="number" id="qtd_chapas" required placeholder="0">
                        </div>

                        <!-- 8. CAMPO DE BUSCA DO MOTORISTA -->
                        <div class="input-block">
                            <label>CPF do Motorista (Digite para buscar):</label>
                            <input type="text" id="cpf" required placeholder="000.000.000-00" onblur="buscarMotorista()">
                        </div>

                        <!-- 9. NOME DO MOTORISTA (Ocupa as duas colunas embaixo) -->
                        <div class="input-block" style="grid-column: span 2;">
                            <label>Nome do Motorista:</label>
                            <input type="text" id="motorista" required placeholder="Nome Completo">
                        </div>

                    </div>
                    <button type="button" class="btn-print" id="btnPrint">Gerar e Imprimir</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Área oculta onde o JavaScript montará as duas vias para o PDF -->
    <div id="print-area"></div>

    <!-- O NOVO ARQUIVO JAVASCRIPT EXCLUSIVO -->
    <script src="impressoes.js"></script>
</body>
</html>
